<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impossible Button</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Bebas+Neue:400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Space+Mono:400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="scanline-overlay"></div>
  <div class="grid-bg"></div>
  <div class="top-bar">
    <span class="logo">IMPOSSIBLE BUTTON</span>
    <div class="give-up-top"><button id="giveUpBtn" class="give-up-btn">I Give Up</button></div>
  </div>
  <main>
    <section id="mainScreen" class="screen show">
      <h1>CLICK THE BUTTON</h1>
      <p class="taunt" id="tauntText">Go on, try it...</p>
      <button id="impossibleBtn">Button</button>
      <!-- Give up panel removed, button is now in top bar -->
    </section>
    <section id="victoryScreen" class="screen">
      <h1>VICTORY!</h1>
      <p>You actually did it in <span id="victoryAttempts">0</span> attempts!</p>
      <div id="confetti"></div>
      <button id="victoryRestartBtn">Restart</button>
    </section>
    <section id="surrenderScreen" class="screen">
      <h1>SURRENDERED</h1>
      <p>Even the best have limits. Try again?</p>
      <button id="retryBtn">Retry</button>
    </section>
  </main>
  <script type="module" src="js/script.js"></script>
</body>
</html>
