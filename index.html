<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Impossible Button</title>
</head>
<body>
  <main>
    <section id="mainScreen">
      <h1>Impossible Button</h1>
      <p class="taunt">Try to click the button below!</p>
      <button id="impossibleBtn">Button</button>
    </section>
    <section id="victoryScreen" style="display:none;">
      <h1>VICTORY!</h1>
      <p>You actually did it!</p>
      <button id="victoryRestartBtn">Restart</button>
    </section>
    <section id="surrenderScreen" style="display:none;">
      <h1>SURRENDERED</h1>
      <p>Even the best have limits. Try again?</p>
      <button id="retryBtn">Retry</button>
    </section>
  </main>
</body>
</html>
